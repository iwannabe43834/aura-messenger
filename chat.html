<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Messenger</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="/socket.io/socket.io.js"></script>
</head>
<body class="pattern-none" id="app-body">

<div class="app-container">
    <div id="toast-container" class="toast-container"></div>

    <div id="profile-modal" class="modal hidden" onclick="closeProfile(event)">
        <div class="modal-content">
            <div class="profile-card">
                <div class="profile-banner"></div>
                <div class="profile-avatar" id="p-avatar">?</div>
                <h2 id="p-name">Имя</h2>
                <p id="p-username">@username</p>
                <div class="profile-bio" id="p-bio">Пользователь Aura</div>
                <button class="close-profile-btn" onclick="toggleProfileModal(false)">Закрыть</button>
            </div>
        </div>
    </div>

    <div id="settings-drawer" class="settings-drawer">
        <div class="drawer-header">
            <button class="back-btn" onclick="toggleSettings(false)">←</button>
            <h3>Мой профиль</h3>
        </div>
        
        <div class="drawer-content">
            <div class="user-profile-preview">
                <div class="avatar-huge" id="user-avatar-main">U</div>
                <input type="file" id="avatar-file-input" style="display:none" accept="image/*" onchange="uploadAvatar(this)">
                <button class="save-profile-btn" style="margin-top:10px; font-size: 0.8rem;" onclick="document.getElementById('avatar-file-input').click()">Выбрать файл</button>
                <h2 id="settings-full-name">Имя</h2>
                <p id="settings-username-display">@username</p>
            </div>
            
            <div class="settings-list">
                <div class="settings-section">ОБЩЕЕ</div>
                <div class="settings-item-col">
                    <label>Отображаемое имя</label>
                    <input type="text" id="edit-display-name" placeholder="Как вас зовут?">
                </div>
                <div class="settings-item-col">
                    <label>Фото профиля (URL)</label>
                    <input type="text" id="edit-avatar-url" placeholder="https://image.png">
                </div>
                <button class="save-profile-btn" onclick="saveProfileChanges()">Сохранить изменения</button>

                <div class="settings-divider"></div>
                <div class="settings-section">ВНЕШНИЙ ВИД</div>
                
                <div class="settings-item">
                    <span>Светлая тема</span>
                    <label class="switch">
                        <input type="checkbox" id="theme-checkbox" onchange="changeTheme(this.checked)">
                        <span class="slider"></span>
                    </label>
                </div>

                <div class="settings-item-col">
                    <label>Паттерн фона</label>
                    <select id="pattern-select" onchange="changePattern(this.value)">
                        <option value="none">Без паттерна</option>
                        <option value="dots">Точки</option>
                        <option value="grid">Сетка</option>
                        <option value="waves">Волны</option>
                    </select>
                </div>

                <div class="settings-divider"></div>
                <button class="settings-item danger" onclick="location.href='/logout'">
                    <span>Выйти из аккаунта</span>
                </button>
            </div>
        </div>
    </div>

    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="header-top">
                <button class="menu-btn" onclick="toggleSettings(true)">☰</button>
                <h2 id="logo-text">Aura</h2>
            </div>
            <div class="search-wrapper">
                <i class="fas fa-search search-icon"></i>
                <input type="text" id="searchUser" placeholder="Найти @username...">
            </div>
        </div>
        <div id="contacts" class="contacts-list"></div>
    </aside>

    <main class="chat-area">
        <div id="welcome-screen" class="welcome-screen">
            <div class="welcome-content">
                <div class="icon">✨</div>
                <h3>Выберите чат</h3>
                <p>Ваша история сохранена</p>
            </div>
        </div>

        <div id="chat-ui" class="chat-ui hidden">
            <header class="chat-header">
                <div class="chat-info" id="chat-header-info" style="cursor: pointer;">
                    <strong id="chat-with-title">@username</strong>
                    <span class="status">в сети</span>
                </div>
            </header>

            <div id="messages" class="messages-container"></div>

            <div id="reply-preview" class="reply-preview hidden">
                <div class="reply-content">
                    <small id="reply-user"></small>
                    <div id="reply-text"></div>
                </div>
                <button class="close-reply" onclick="cancelReply()">✕</button>
            </div>

            <div class="input-container">
                <input type="text" id="msgInput" placeholder="Напишите сообщение..." autocomplete="off">
                <button id="sendBtn">
                    <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
                </button>
            </div>
        </div>
    </main>
</div>

<script>
    const socket = io('https://aura-messenger.onrender.com');
    let currentUser = null;
    let selectedUser = null;
    let replyData = null;

    const messagesDiv = document.getElementById('messages');
    const searchInput = document.getElementById('searchUser');
    const msgInput = document.getElementById('msgInput');
    const sendBtn = document.getElementById('sendBtn');
    const contactsDiv = document.getElementById('contacts');

    function showToast(message) {
        const container = document.getElementById('toast-container');
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerHTML = `<i class="fas fa-magic"></i> <span>${message}</span>`;
        container.appendChild(toast);
        setTimeout(() => {
            toast.classList.add('fade-out');
            setTimeout(() => toast.remove(), 400);
        }, 3000);
    }

    async function init() {
        try {
            const res = await fetch('/me');
            currentUser = await res.json();
            if (!currentUser.username) return window.location.href = '/index.html';
            
            socket.emit('identify', currentUser.username);
            socket.emit('get_my_chats'); 
            
            document.getElementById('edit-display-name').value = currentUser.name || '';
            document.getElementById('edit-avatar-url').value = currentUser.avatar || '';
            
            applySavedPreferences();
            updateHeaderUI();
        } catch (err) {
            window.location.href = '/auth.html';
        }
    }
    init();

    function uploadAvatar(input) {
        const file = input.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('edit-avatar-url').value = e.target.result;
                showToast("Изображение загружено. Нажмите сохранить.");
            };
            reader.readAsDataURL(file);
        }
    }

    searchInput.onkeypress = (e) => {
        if (e.key === 'Enter' && searchInput.value.trim()) {
            const target = searchInput.value.trim().replace('@', '');
            if (target === currentUser.username) return showToast("Нельзя искать себя");
            socket.emit('search_user', target);
        }
    };

    socket.on('search_result', (data) => {
        if (data.exists) {
            openChat(data.username);
            searchInput.value = '';
        } else {
            showToast("Пользователь не найден");
        }
    });

    async function saveProfileChanges() {
        const newName = document.getElementById('edit-display-name').value;
        const newAvatar = document.getElementById('edit-avatar-url').value;

        try {
            const res = await fetch('/update-profile', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ name: newName, avatar: newAvatar })
            });
            if (res.ok) {
                showToast("Профиль обновлен!");
                currentUser.name = newName;
                currentUser.avatar = newAvatar;
                updateHeaderUI();
            }
        } catch (e) { showToast("Ошибка сохранения"); }
    }

    function updateHeaderUI() {
        document.getElementById('settings-full-name').textContent = currentUser.name || currentUser.username;
        const avatarEl = document.getElementById('user-avatar-main');
        if (currentUser.avatar) {
            avatarEl.style.backgroundImage = `url(${currentUser.avatar})`;
            avatarEl.textContent = '';
        } else {
            avatarEl.style.backgroundImage = 'none';
            avatarEl.textContent = (currentUser.name || currentUser.username)[0].toUpperCase();
        }
    }

    async function viewUserProfile(username) {
        try {
            const res = await fetch(`/user/${username}`);
            const data = await res.json();
            
            document.getElementById('p-name').textContent = data.name || username;
            document.getElementById('p-username').textContent = '@' + username;
            const pAvatar = document.getElementById('p-avatar');
            
            if (data.avatar) {
                pAvatar.style.backgroundImage = `url(${data.avatar})`;
                pAvatar.textContent = '';
            } else {
                pAvatar.style.backgroundImage = 'none';
                pAvatar.textContent = (data.name || username)[0].toUpperCase();
            }
            
            toggleProfileModal(true);
        } catch (e) { showToast("Ошибка загрузки профиля"); }
    }

    function toggleProfileModal(show) {
        document.getElementById('profile-modal').classList.toggle('hidden', !show);
    }

    function closeProfile(e) {
        if (e.target.id === 'profile-modal') toggleProfileModal(false);
    }

    function applySavedPreferences() {
        const theme = localStorage.getItem('aura-theme') || 'dark';
        const pattern = localStorage.getItem('aura-pattern') || 'none';
        changeTheme(theme === 'light');
        changePattern(pattern);
        document.getElementById('pattern-select').value = pattern;
    }

    function changeTheme(isLight) {
        const theme = isLight ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', theme);
        localStorage.setItem('aura-theme', theme);
        document.getElementById('theme-checkbox').checked = isLight;
    }

    function changePattern(pattern) {
        document.getElementById('app-body').className = `pattern-${pattern}`;
        localStorage.setItem('aura-pattern', pattern);
    }

    function toggleSettings(show) {
        const drawer = document.getElementById('settings-drawer');
        if (show) {
            drawer.classList.add('active');
            updateHeaderUI();
            document.getElementById('settings-username-display').textContent = '@' + currentUser.username;
        } else {
            drawer.classList.remove('active');
        }
    }

    socket.on('my_chats_list', (chats) => {
        contactsDiv.innerHTML = '';
        chats.forEach(updateContactsUI);
    });

    function openChat(username) {
        selectedUser = username;
        document.getElementById('welcome-screen').classList.add('hidden');
        document.getElementById('chat-ui').classList.remove('hidden');
        document.getElementById('chat-with-title').textContent = `@${username}`;
        document.getElementById('chat-header-info').onclick = () => viewUserProfile(username);
        
        updateContactsUI(username);
        socket.emit('get_history', username);
    }

    function updateContactsUI(username) {
        let el = document.getElementById(`contact-${username}`);
        if (!el) {
            el = document.createElement('div');
            el.id = `contact-${username}`;
            el.className = 'contact-item';
            el.innerHTML = `
                <div class="avatar" id="avatar-${username}">${username[0].toUpperCase()}</div> 
                <div class="contact-info"><strong>@${username}</strong></div>
            `;
            el.onclick = () => openChat(username);
            contactsDiv.prepend(el);
        }
        document.querySelectorAll('.contact-item').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
    }

    socket.on('chat_history', (history) => {
        messagesDiv.innerHTML = '';
        history.forEach(renderMsg);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    });

    socket.on('msg_receive', (msg) => {
        if (msg.from === selectedUser || msg.from === currentUser.username) {
            renderMsg(msg);
        } else {
            updateContactsUI(msg.from);
            showToast(`Сообщение от @${msg.from}`);
        }
    });

    function startReply(username, text) {
        replyData = { username, text };
        document.getElementById('reply-user').innerText = username;
        document.getElementById('reply-text').innerText = text;
        document.getElementById('reply-preview').classList.remove('hidden');
        msgInput.focus();
    }

    function cancelReply() {
        replyData = null;
        document.getElementById('reply-preview').classList.add('hidden');
    }

    function deleteLocalMsg(element) {
        if(confirm("Удалить сообщение?")) {
            element.closest('.message-row').remove();
        }
    }

    // ИСПРАВЛЕННАЯ ФУНКЦИЯ ОТРИСОВКИ (БЕЗ АВАТАРОК)
    function renderMsg(msg) {
        const isMine = msg.from === currentUser.username;
        const div = document.createElement('div');
        // Добавляем класс mine или other для выравнивания через CSS
        div.className = `message-row ${isMine ? 'mine' : 'other'}`;
        
        let replyMarkup = msg.reply ? `
            <div class="msg-reply-info">
                <small>↩ @${msg.reply.username}</small>
                <div class="reply-text-msg">${msg.reply.text}</div>
            </div>` : '';

        // Генерируем только бабл с текстом
        div.innerHTML = `
            <div class="bubble">
                ${replyMarkup}
                <div class="text">${msg.text}</div>
                <div class="time">${msg.time || ''}</div>
                <div class="msg-actions">
                    <span onclick="startReply('${msg.from}', '${msg.text}')">Ответить</span>
                    ${isMine ? `<span onclick="deleteLocalMsg(this)">Удалить</span>` : ''}
                </div>
            </div>
        `;
        messagesDiv.appendChild(div);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function send() {
        const text = msgInput.value.trim();
        if (text && selectedUser) {
            const payload = { 
                to: selectedUser, 
                text: text,
                reply: replyData
            };
            socket.emit('private_msg', payload);
            msgInput.value = '';
            cancelReply();
        }
    }

    sendBtn.onclick = send;
    msgInput.onkeypress = (e) => { if(e.key === 'Enter') send() };
</script>
</body>
</html>
