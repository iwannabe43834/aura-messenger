<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura — Добро пожаловать</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="bg-animation">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
    </div>

    <div id="toast-container" class="toast-container"></div>

    <div class="auth-container animate__fadeIn">
        <div class="auth-icon">✨</div>
        
        <h2 id="auth-title">Вход в Aura</h2>
        <p id="auth-subtitle">Твой уютный уголок для общения</p>
        
        <div class="input-group" id="auth-form">
            <div class="input-wrapper reg-only hidden">
                <i class="fas fa-user"></i>
                <input type="text" id="name" placeholder="Ваше Имя" autocomplete="off">
            </div>

            <div id="email-wrapper" class="input-wrapper reg-only hidden">
                <i class="fas fa-envelope"></i>
                <input type="email" id="email" placeholder="Email" autocomplete="off">
            </div>

            <div id="username-wrapper" class="input-wrapper">
                <i class="fas fa-at"></i>
                <input type="text" id="username" placeholder="Username" autocomplete="off">
            </div>

            <div id="password-wrapper" class="input-wrapper">
                <i class="fas fa-lock"></i>
                <input type="password" id="password" placeholder="Пароль">
            </div>

            <div id="code-wrapper" class="input-wrapper hidden">
                <i class="fas fa-key"></i>
                <input type="text" id="recovery-code" placeholder="Код из письма">
            </div>
        </div>
        
        <button id="auth-btn">Войти</button>
        
        <div class="auth-footer">
            <div class="toggle-link" id="toggle-auth">Нет аккаунта? Зарегистрироваться</div>
            <div class="toggle-link" id="forgot-password">Забыли пароль?</div>
        </div>
    </div>

    <script>
        const authBtn = document.getElementById('auth-btn');
        const toggleLink = document.getElementById('toggle-auth');
        const forgotLink = document.getElementById('forgot-password');
        const authTitle = document.getElementById('auth-title');
        const authSubtitle = document.getElementById('auth-subtitle');
        const regOnlyFields = document.querySelectorAll('.reg-only');
        
        let mode = 'login'; // login, register, forgot, reset

        function showToast(message, type = 'error') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            const icon = type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle';
            toast.innerHTML = `<i class="fas ${icon}"></i><span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.classList.add('fade-out');
                setTimeout(() => toast.remove(), 400);
            }, 3500);
        }

        // Переключение режимов
        function setMode(newMode) {
            mode = newMode;
            // Сбрасываем видимость всего
            document.querySelectorAll('.input-wrapper').forEach(el => el.classList.add('hidden'));
            forgotLink.classList.remove('hidden');

            if (mode === 'login') {
                authTitle.innerText = "Вход в Aura";
                authSubtitle.innerText = "С возвращением!";
                authBtn.innerText = "Войти";
                toggleLink.innerText = "Нет аккаунта? Зарегистрироваться";
                document.getElementById('username-wrapper').classList.remove('hidden');
                document.getElementById('password-wrapper').classList.remove('hidden');
            } 
            else if (mode === 'register') {
                authTitle.innerText = "Регистрация";
                authSubtitle.innerText = "Присоединяйся к нам";
                authBtn.innerText = "Создать аккаунт";
                toggleLink.innerText = "Уже есть аккаунт? Войти";
                regOnlyFields.forEach(el => el.classList.remove('hidden'));
                document.getElementById('username-wrapper').classList.remove('hidden');
                document.getElementById('password-wrapper').classList.remove('hidden');
            } 
            else if (mode === 'forgot') {
                authTitle.innerText = "Восстановление";
                authSubtitle.innerText = "Введите почту для получения кода";
                authBtn.innerText = "Отправить код";
                toggleLink.innerText = "Вернуться назад";
                document.getElementById('email-wrapper').classList.remove('hidden');
                forgotLink.classList.add('hidden');
            }
            else if (mode === 'reset') {
                authTitle.innerText = "Новый пароль";
                authSubtitle.innerText = "Код отправлен на вашу почту";
                authBtn.innerText = "Сбросить пароль";
                document.getElementById('email-wrapper').classList.remove('hidden');
                document.getElementById('code-wrapper').classList.remove('hidden');
                document.getElementById('password-wrapper').classList.remove('hidden');
                forgotLink.classList.add('hidden');
            }
        }

        toggleLink.onclick = () => {
            if (mode === 'login') setMode('register');
            else setMode('login');
        };

        forgotLink.onclick = () => setMode('forgot');

        authBtn.onclick = async () => {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const code = document.getElementById('recovery-code').value.trim();

            try {
                authBtn.disabled = true;
                let response;

                if (mode === 'login') {
                    response = await fetch('/login', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ username: username.replace('@', ''), password })
                    });
                } 
                else if (mode === 'register') {
                    response = await fetch('/register', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ username: username.replace('@', ''), password, name, email })
                    });
                }
                else if (mode === 'forgot') {
                    response = await fetch('/send-recovery-code', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ email })
                    });
                    if (response.ok) {
                        showToast("Код отправлен!", "success");
                        setMode('reset');
                        authBtn.disabled = false;
                        return;
                    }
                }
                else if (mode === 'reset') {
                    response = await fetch('/reset-password', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ email, code, newPassword: password })
                    });
                    if (response.ok) {
                        showToast("Пароль изменен!", "success");
                        setMode('login');
                        authBtn.disabled = false;
                        return;
                    }
                }

                const result = await response.json();
                if (response.ok) {
                    window.location.href = '/';
                } else {
                    showToast(result.error || "Ошибка");
                }
            } catch (err) {
                showToast("Ошибка сервера");
            } finally {
                authBtn.disabled = false;
            }
        };

        // Авто-тема
        const savedTheme = localStorage.getItem('aura-theme');
        if (savedTheme === 'light') document.documentElement.setAttribute('data-theme', 'light');
    </script>

    <style>
        .auth-footer {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .toast-container {
            position: fixed;
            top: 25px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 12px;
            pointer-events: none;
        }

        .toast {
            min-width: 280px;
            padding: 14px 22px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            color: white;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            animation: toastIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        
        .toast.success i { color: #00ff88; }
        .toast.error i { color: #ff4757; }

        @keyframes toastIn {
            from { opacity: 0; transform: translateY(-30px) scale(0.9); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .input-wrapper.hidden { display: none !important; }
        
        .auth-container {
            max-width: 400px;
            margin: 100px auto;
            padding: 40px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .input-wrapper {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            margin-bottom: 15px;
            padding: 12px 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .input-wrapper input {
            background: transparent;
            border: none;
            color: white;
            outline: none;
            width: 100%;
        }

        #auth-btn {
            width: 100%;
            padding: 15px;
            background: #7d67ff;
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        #auth-btn:hover { background: #664dff; transform: translateY(-2px); }

        .toggle-link {
            color: rgba(255, 255, 255, 0.6);
            cursor: pointer;
            font-size: 14px;
            text-align: center;
        }

        .toggle-link:hover { color: #7d67ff; }
        .auth-icon { text-align: center; font-size: 50px; margin-bottom: 20px; }
        h2, p { text-align: center; color: white; margin: 5px 0; }
    </style>
</body>
</html>
