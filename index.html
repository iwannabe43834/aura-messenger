<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Aura Messenger</title>
    <link rel="manifest" href="manifest.json">

    <meta name="theme-color" content="#7d67ff">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        /* Глобальные исправления для аватарок */
        .avatar, .msg-avatar-small, .avatar-huge, .profile-avatar {
            background-size: cover !important;
            background-position: center !important;
            background-repeat: no-repeat !important;
            display: flex !important;
            align-items: center;
            justify-content: center;
            background-color: #7d67ff; 
            color: white;
            font-weight: bold;
            flex-shrink: 0;
            overflow: hidden;
        }

        .msg-avatar-small {
            width: 35px; height: 35px;
            border-radius: 10px; margin-right: 10px;
            font-size: 0.9rem;
        }

        .message-row.other { display: flex; align-items: flex-end; margin-bottom: 15px; }

        .contact-item .avatar {
            width: 45px; height: 45px;
            border-radius: 12px; font-size: 1.2rem;
        }

        .hidden { display: none !important; }

        /* Стили для медиа-сообщений */
        .media-content { max-width: 100%; border-radius: 10px; margin-top: 5px; display: block; cursor: pointer; }
        .media-video { width: 100%; max-width: 300px; border-radius: 10px; margin-top: 5px; }
        .media-audio { width: 100%; min-width: 200px; margin-top: 5px; }

        /* Галочки и футер сообщения */
        .msg-footer {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 4px;
            margin-top: 4px;
        }
        .status-ticks { font-size: 0.7rem; color: #888; display: flex; }
        .status-ticks.read { color: #4db5f9; }

        /* Кнопки действий (удаление/ответ) */
        .msg-actions {
            display: flex;
            gap: 12px;
            margin-top: 8px;
            padding-top: 5px;
            border-top: 1px solid rgba(255,255,255,0.05);
        }
        .action-btn { font-size: 0.7rem; cursor: pointer; color: var(--primary); font-weight: 600; text-transform: uppercase; }
        .action-btn.del { color: #ff5f5f; }

        /* Кнопка избранного */
        .saved-messages-item {
            display: flex; align-items: center; padding: 12px 15px;
            margin: 5px 10px; border-radius: 12px; cursor: pointer;
            transition: 0.2s; background: rgba(125, 103, 255, 0.1);
            border: 1px solid rgba(125, 103, 255, 0.2);
        }
        .saved-icon { 
            width: 45px; height: 45px; background: #7d67ff; 
            border-radius: 12px; display: flex; align-items: center; 
            justify-content: center; margin-right: 12px; color: white;
        }

        .mobile-back-btn {
            display: none; background: none; border: none;
            color: var(--primary); font-size: 1.2rem; cursor: pointer; margin-right: 10px;
        }
        @media (max-width: 768px) { .mobile-back-btn { display: block; } }
    </style>
</head>
<body class="pattern-none" id="app-body">

<audio id="snd-send" src="send.mp3" preload="auto"></audio>
<audio id="snd-notify" src="notify.mp3" preload="auto"></audio>

<div class="app-container" id="main-container">
    <div id="toast-container" class="toast-container"></div>

    <div id="profile-modal" class="modal hidden" onclick="closeProfile(event)">
        <div class="modal-content">
            <div class="profile-card">
                <div class="profile-banner"></div>
                <div class="profile-avatar" id="p-avatar"></div>
                <h2 id="p-name">Имя</h2>
                <p id="p-username">@username</p>
                <div class="profile-bio">Пользователь Aura Pro</div>
                <button class="close-profile-btn" onclick="toggleProfileModal(false)">Закрыть</button>
            </div>
        </div>
    </div>

    <div id="settings-drawer" class="settings-drawer">
        <div class="drawer-header">
            <button class="back-btn" onclick="toggleSettings(false)">←</button>
            <h3>Настройки</h3>
        </div>
        <div class="drawer-content">
            <div class="user-profile-preview">
                <div class="avatar-huge" id="user-avatar-main"></div>
                <input type="file" id="avatar-file-input" style="display:none" accept="image/*" onchange="uploadAvatar(this)">
                <button class="save-profile-btn" style="margin-top:15px;" onclick="document.getElementById('avatar-file-input').click()">
                    <i class="fas fa-camera"></i> Изменить фото
                </button>
                <h2 id="settings-full-name">Имя</h2>
                <p id="settings-username-display">@username</p>
            </div>
            
            <div class="settings-list">
                <div class="settings-section">ПРОФИЛЬ</div>
                <div class="settings-item-col">
                    <label>Ваше имя</label>
                    <input type="text" id="edit-display-name" placeholder="Введите имя...">
                </div>
                <button class="save-profile-btn" onclick="saveProfileChanges()">Сохранить имя</button>
                <div class="settings-divider"></div>
                <div class="settings-section">ВНЕШНИЙ ВИД</div>
                <div class="settings-item">
                    <span>Светлая тема</span>
                    <label class="switch">
                        <input type="checkbox" id="theme-checkbox" onchange="changeTheme(this.checked)">
                        <span class="slider"></span>
                    </label>
                </div>
                <div class="settings-item-col">
                    <label>Паттерн фона</label>
                    <select id="pattern-select" onchange="changePattern(this.value)">
                        <option value="none">Без узора</option>
                        <option value="dots">Точки</option>
                        <option value="grid">Сетка</option>
                    </select>
                </div>
                <div class="settings-divider"></div>
                <button class="settings-item danger" onclick="location.href='/logout'">
                    <span>Выйти из системы</span>
                </button>
            </div>
        </div>
    </div>

    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="header-top">
                <button class="menu-btn" onclick="toggleSettings(true)">☰</button>
                <h2 id="logo-text">Aura</h2>
            </div>
            <div class="search-wrapper">
                <i class="fas fa-search search-icon"></i>
                <input type="text" id="searchUser" placeholder="Поиск @username...">
            </div>
        </div>

        <div class="saved-messages-item" onclick="openChat('me')">
            <div class="saved-icon"><i class="fas fa-bookmark"></i></div>
            <div class="contact-info">
                <strong>Избранное</strong>
                <div style="font-size: 0.75rem; opacity: 0.6;">Личное хранилище</div>
            </div>
        </div>

        <div id="contacts" class="contacts-list"></div>
    </aside>

    <main class="chat-area">
        <div id="welcome-screen" class="welcome-screen">
            <div class="welcome-content">
                <div class="icon">✨</div>
                <h3>Выберите чат</h3>
                <p>Ваши сообщения защищены</p>
            </div>
        </div>

        <div id="chat-ui" class="chat-ui hidden">
            <header class="chat-header">
                <button class="mobile-back-btn" onclick="closeChatMobile()">
                    <i class="fas fa-arrow-left"></i>
                </button>
                <div class="chat-info" id="chat-header-info" style="cursor: pointer;">
                    <strong id="chat-with-title">@username</strong>
                    <span class="status">в сети</span>
                </div>
            </header>

            <div id="messages" class="messages-container"></div>

            <div id="reply-preview" class="reply-preview hidden">
                <div class="reply-content">
                    <small id="reply-user"></small>
                    <div id="reply-text"></div>
                </div>
                <button class="close-reply" onclick="cancelReply()">✕</button>
            </div>

            <div class="input-container">
                <input type="file" id="mediaInput" style="display:none" accept="image/*,video/*,audio/*" onchange="sendMediaFile(this)">
                <button class="attach-btn" onclick="document.getElementById('mediaInput').click()">
                    <i class="fas fa-paperclip"></i>
                </button>
                <input type="text" id="msgInput" placeholder="Напишите сообщение..." autocomplete="off">
                <button id="sendBtn"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </main>
</div>

<script>
    const socket = io();
    let currentUser = null;
    let selectedUser = null;
    let replyData = null;

    const messagesDiv = document.getElementById('messages');
    const searchInput = document.getElementById('searchUser');
    const msgInput = document.getElementById('msgInput');
    const sendBtn = document.getElementById('sendBtn');
    const contactsDiv = document.getElementById('contacts');
    const mainContainer = document.getElementById('main-container');

    function showToast(message) {
        const container = document.getElementById('toast-container');
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerHTML = `<span>${message}</span>`;
        container.appendChild(toast);
        setTimeout(() => {
            toast.style.opacity = '0';
            setTimeout(() => toast.remove(), 400);
        }, 3000);
    }

    async function init() {
        try {
            const res = await fetch('/me');
            currentUser = await res.json();
            if (!currentUser.username) return window.location.href = '/auth.html';
            
            socket.emit('identify', currentUser.username);
            socket.emit('get_my_chats'); 
            
            document.getElementById('edit-display-name').value = currentUser.name || '';
            applySavedPreferences();
            updateHeaderUI();
        } catch (err) { window.location.href = '/auth.html'; }
    }
    init();

    function closeChatMobile() { mainContainer.classList.remove('chat-open'); }

    function openChat(username) {
        selectedUser = username;
        document.getElementById('welcome-screen').classList.add('hidden');
        document.getElementById('chat-ui').classList.remove('hidden');
        mainContainer.classList.add('chat-open');
        
        if (username === 'me') {
            document.getElementById('chat-with-title').textContent = `⭐ Избранное`;
            document.getElementById('chat-header-info').onclick = null;
        } else {
            document.getElementById('chat-with-title').textContent = `@${username}`;
            document.getElementById('chat-header-info').onclick = () => viewUserProfile(username);
            updateContactsUI(username);
        }
        socket.emit('mark_read', { chatWith: username });
        socket.emit('get_history', username);
    }

    function deleteMessage(id) {
        if (confirm("Удалить это сообщение у всех?")) {
            socket.emit('delete_msg', id);
        }
    }

    async function renderMsg(msg) {
        const isMine = msg.from === currentUser.username;
        const isSaved = selectedUser === 'me';
        const div = document.createElement('div');
        div.className = `message-row ${isMine ? 'mine' : 'other'}`;
        div.setAttribute('data-id', msg.id);
        
        let contentHtml = '';
        if (msg.media) {
            if (msg.media.type === 'image') contentHtml = `<img src="${msg.media.data}" class="media-content" onclick="window.open(this.src)">`;
            else if (msg.media.type === 'video') contentHtml = `<video src="${msg.media.data}" controls class="media-video"></video>`;
            else if (msg.media.type === 'audio') contentHtml = `<audio src="${msg.media.data}" controls class="media-audio"></audio>`;
        }
        if (msg.text) contentHtml += `<div class="text">${msg.text}</div>`;

        let replyMarkup = msg.reply ? `<div class="msg-reply-info"><small>↩ @${msg.reply.username}</small><div class="reply-text-msg">${msg.reply.text}</div></div>` : '';

        // Галочки
        const ticksHtml = isMine ? `
            <span class="status-ticks ${msg.read ? 'read' : ''}">
                <i class="fas fa-check"></i>${msg.read ? '<i class="fas fa-check" style="margin-left:-4px"></i>' : ''}
            </span>` : '';

        const avId = 'msg-av-' + Math.random().toString(36).substr(2, 9);

        div.innerHTML = `
            ${(!isMine && !isSaved) ? `<div class="msg-avatar-small" id="${avId}"></div>` : ''}
            <div class="bubble">
                ${replyMarkup}
                ${contentHtml}
                <div class="msg-footer">
                    <span class="time" style="font-size:0.7rem; opacity:0.5;">${msg.time || ''}</span>
                    ${ticksHtml}
                </div>
                <div class="msg-actions">
                    <span class="action-btn" onclick="startReply('${msg.from}', '${msg.text || 'Медиа'}')">Ответить</span>
                    ${isMine ? `<span class="action-btn del" onclick="deleteMessage('${msg.id}')">Удалить</span>` : ''}
                </div>
            </div>
        `;
        messagesDiv.appendChild(div);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;

        if (!isMine && !isSaved) {
            const res = await fetch(`/user/${msg.from}`);
            const data = await res.json();
            const avEl = document.getElementById(avId);
            if (avEl) {
                if (data.avatar) avEl.style.backgroundImage = `url(${data.avatar})`;
                else avEl.textContent = (data.name || msg.from)[0].toUpperCase();
            }
        }
    }

    function send() {
        const text = msgInput.value.trim();
        if ((text || replyData) && selectedUser) {
            socket.emit('private_msg', { to: selectedUser, text: text, reply: replyData });
            msgInput.value = '';
            cancelReply();
        }
    }

    socket.on('msg_receive', (msg) => {
        if (msg.from === selectedUser || msg.from === currentUser.username || (selectedUser === 'me' && msg.to === 'me')) {
            renderMsg(msg);
            if (msg.from !== currentUser.username) {
                document.getElementById('snd-notify').play();
                socket.emit('mark_read', { chatWith: msg.from });
            } else {
                document.getElementById('snd-send').play();
            }
        } else {
            document.getElementById('snd-notify').play();
            updateContactsUI(msg.from);
        }
    });

    socket.on('messages_read', (data) => {
        if (selectedUser === data.by) {
            document.querySelectorAll('.mine .status-ticks').forEach(el => {
                el.classList.add('read');
                el.innerHTML = '<i class="fas fa-check"></i><i class="fas fa-check" style="margin-left:-4px"></i>';
            });
        }
    });

    socket.on('msg_deleted', (msgId) => {
        const el = document.querySelector(`[data-id="${msgId}"]`);
        if (el) el.remove();
    });

    socket.on('chat_history', (history) => {
        messagesDiv.innerHTML = '';
        history.forEach(renderMsg);
    });

    // ПОИСК И КОНТАКТЫ
    searchInput.onkeypress = (e) => {
        if (e.key === 'Enter' && searchInput.value.trim()) {
            const target = searchInput.value.trim().replace('@', '');
            socket.emit('search_user', target);
        }
    };

    socket.on('search_result', (data) => {
        if (data.exists) { openChat(data.username); searchInput.value = ''; } 
        else { showToast("Пользователь не найден"); }
    });

    socket.on('my_chats_list', (chats) => {
        contactsDiv.innerHTML = '';
        chats.forEach(updateContactsUI);
    });

    async function updateContactsUI(username) {
        if (username === currentUser.username) return;
        let el = document.getElementById(`contact-${username}`);
        if (!el) {
            el = document.createElement('div');
            el.id = `contact-${username}`;
            el.className = 'contact-item';
            el.innerHTML = `<div class="avatar" id="avatar-list-${username}"></div><div class="contact-info"><strong>@${username}</strong></div>`;
            el.onclick = () => openChat(username);
            contactsDiv.prepend(el);
        }
        const res = await fetch(`/user/${username}`);
        const data = await res.json();
        const avEl = document.getElementById(`avatar-list-${username}`);
        if (avEl && data.avatar) avEl.style.backgroundImage = `url(${data.avatar})`;
        else if (avEl) avEl.textContent = (data.name || username)[0].toUpperCase();
    }

    // МЕДИА
    function sendMediaFile(input) {
        const file = input.files[0];
        const reader = new FileReader();
        reader.onload = (e) => {
            socket.emit('private_msg', {
                to: selectedUser,
                text: '',
                media: { type: file.type.split('/')[0], data: e.target.result, name: file.name },
                reply: replyData
            });
            cancelReply();
        };
        reader.readAsDataURL(file);
        input.value = '';
    }

    // ПРОФИЛЬ
    function updateHeaderUI() {
        const name = currentUser.name || currentUser.username;
        document.getElementById('settings-full-name').textContent = name;
        document.getElementById('settings-username-display').textContent = '@' + currentUser.username;
        const avatarEl = document.getElementById('user-avatar-main');
        if (currentUser.avatar) avatarEl.style.backgroundImage = `url(${currentUser.avatar})`;
        else avatarEl.textContent = name[0].toUpperCase();
    }

    async function saveProfileChanges() {
        const newName = document.getElementById('edit-display-name').value;
        const res = await fetch('/update-profile', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ name: newName })
        });
        if (res.ok) { currentUser.name = newName; updateHeaderUI(); showToast("Имя сохранено!"); }
    }

    function uploadAvatar(input) {
        const file = input.files[0];
        const reader = new FileReader();
        reader.onload = async (e) => {
            const res = await fetch('/update-profile', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ avatar: e.target.result })
            });
            if (res.ok) { currentUser.avatar = e.target.result; updateHeaderUI(); showToast("Фото обновлено!"); }
        };
        reader.readAsDataURL(file);
    }

    async function viewUserProfile(username) {
        const res = await fetch(`/user/${username}`);
        const data = await res.json();
        document.getElementById('p-name').textContent = data.name || username;
        document.getElementById('p-username').textContent = '@' + username;
        const pAvatar = document.getElementById('p-avatar');
        if (data.avatar) pAvatar.style.backgroundImage = `url(${data.avatar})`;
        else pAvatar.textContent = (data.name || username)[0].toUpperCase();
        toggleProfileModal(true);
    }

    // УТИЛИТЫ
    function startReply(username, text) {
        replyData = { username, text };
        document.getElementById('reply-user').innerText = username;
        document.getElementById('reply-text').innerText = text;
        document.getElementById('reply-preview').classList.remove('hidden');
        msgInput.focus();
    }
    function cancelReply() { replyData = null; document.getElementById('reply-preview').classList.add('hidden'); }

    function applySavedPreferences() {
        const theme = localStorage.getItem('aura-theme') || 'dark';
        const pattern = localStorage.getItem('aura-pattern') || 'none';
        changeTheme(theme === 'light');
        changePattern(pattern);
        document.getElementById('pattern-select').value = pattern;
    }
    function changeTheme(isLight) {
        const theme = isLight ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', theme);
        localStorage.setItem('aura-theme', theme);
        document.getElementById('theme-checkbox').checked = isLight;
    }
    function changePattern(p) {
        document.getElementById('app-body').className = `pattern-${p}`;
        localStorage.setItem('aura-pattern', p);
    }
    function toggleSettings(show) { document.getElementById('settings-drawer').classList.toggle('active', show); }
    function toggleProfileModal(show) { document.getElementById('profile-modal').classList.toggle('hidden', !show); }
    function closeProfile(e) { if (e.target.id === 'profile-modal') toggleProfileModal(false); }

    sendBtn.onclick = send;
    msgInput.onkeypress = (e) => { if(e.key === 'Enter') send(); };

</script>
</body>
</html>
